# Logging configuration
log:
  consoleLevel: info
  fileLevel: info
  filePath: logs/server.log

# Database paths
database:
  mainDbPath: main.db
  saveGameDbPath: save.db

# HTTP / WebSocket server
httpServer:
  host: 0.0.0.0
  port: 8080
  maxMessageSize: 10485760
  rpcTimeoutMs: 5000
  clientToken: ""

# Text-to-speech (dummy | elevenlabs)
tts:
  provider: dummy
  # elevenLabs:
  #   apiKey: ""
  #   model: eleven_multilingual_v2
  #   stability: 0.75
  #   similarityBoost: 0.75
  #   style: 0.2
  #   useSpeakerBoost: false
  #   voiceIdMapping:
  #     fallback: "<voiceId>"
  #     byRaceSex:
  #       dm: "<voiceId>"
  #       df: "<voiceId>"
  mp3Speed:
    ffmpegExePath: ffmpeg
    charactersPerSecond: 15

# Speech-to-text (dummy | deepgram)
stt:
  provider: dummy
  # deepgram:
  #   apiKey: ""
  #   sampleRate: 16000
  #   encoding: linear16
  #   language: en
  #   model: nova-2

# Player persona (injected into NPC prompts)
playerPersona:
  backstory: ""
  includeStats: true
  includeLocation: true

# Director
director:
  compactThreshold: 30
  compactKeepRecent: 10

# LLM (dummy | gemini | openai)
